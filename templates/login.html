<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNGA Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-layout">
    <div class="auth-container">
        <div class="auth-theme-toggle">
            <label class="theme-switch">
                <input id="themeToggle" type="checkbox">
                <span>Light mode</span>
            </label>
        </div>
        <section class="card">
            <h1 class="brand">SUNGA</h1>
            <h3>Secure Login</h3>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            <form method="POST" id="loginForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label for="login-username">Username</label><input id="login-username" name="username" type="text" required maxlength="30">
                <label for="login-password">Password</label>
                <div class="password-field-wrap">
                    <input id="login-password" name="password" type="password" required minlength="8" autocomplete="current-password">
                    <button type="button" class="btn-secondary btn-password-toggle" data-password-toggle aria-controls="login-password" aria-pressed="false" aria-label="Show password">Show</button>
                </div>
                <button type="submit">Continue</button>
            </form>
            <a class="btn-inline btn-secondary" href="{{ url_for('index') }}">Back to Home</a>
            <p class="small-muted">2FA OTP verification is required after password check.</p>
            <p><a href="{{ url_for('admin_login') }}">Admin login</a></p>
            <p>New user? <a href="{{ url_for('register') }}">Create account</a></p>
        </section>
    </div>
<script>
const themeToggle = document.getElementById("themeToggle");
const savedTheme = localStorage.getItem("theme") || "dark";
document.body.classList.toggle("light", savedTheme === "light");
themeToggle.checked = savedTheme === "light";
themeToggle.addEventListener("change", () => {
    const theme = themeToggle.checked ? "light" : "dark";
    document.body.classList.toggle("light", theme === "light");
    localStorage.setItem("theme", theme);
});
</script>
<script src="{{ url_for('static', filename='auth-password-toggle.js') }}"></script>
</body>
</html>
