<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNGA Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-layout">
    <div class="auth-container">
        <div class="auth-theme-toggle">
            <label class="theme-switch">
                <input id="themeToggle" type="checkbox">
                <span>Light mode</span>
            </label>
        </div>
        <section class="card">
            <h1 class="brand">SUNGA</h1>
            <h3>Secure Login</h3>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            <form method="POST" id="loginForm">
                <label>Username</label><input name="username" type="text" required maxlength="30">
                <label>Password</label><input name="password" type="password" required minlength="8">
                <button type="submit">Continue</button>
            </form>
            <p class="small-muted">2FA OTP verification is required after password check.</p>
            <p>New user? <a href="{{ url_for('register') }}">Create account</a></p>
        </section>
    </div>
<script>
const themeToggle = document.getElementById("themeToggle");
const savedTheme = localStorage.getItem("theme") || "dark";
document.body.classList.toggle("light", savedTheme === "light");
themeToggle.checked = savedTheme === "light";
themeToggle.addEventListener("change", () => {
    const theme = themeToggle.checked ? "light" : "dark";
    document.body.classList.toggle("light", theme === "light");
    localStorage.setItem("theme", theme);
});
</script>
</body>
</html>
